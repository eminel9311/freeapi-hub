services:
  postgres:
    image: postgres:16-alpine
    container_name: freeapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: freeapi
      POSTGRES_PASSWORD: freeapi
      POSTGRES_DB: freeapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: freeapi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Uncomment khi muốn chạy app bằng container (Tuần 6)
  # app:
  #   build: .
  #   container_name: freeapi-app
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     DATABASE_URL: postgres://freeapi:freeapi@postgres:5432/freeapi?sslmode=disable
  #     REDIS_URL: redis://redis:6379/0
  #     JWT_SECRET: ${JWT_SECRET}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
  redis_data:
